<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Lịch làm việc</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

<div class="container mx-auto p-6">
  <h1 class="text-3xl font-bold mb-6 text-center">Lịch Làm Việc (Tuần)</h1>

  <!-- Nút chuyển tuần -->
  <div class="flex justify-between mb-4">
    <button onclick="prevWeek()" class="bg-gray-700 px-4 py-2 rounded-xl">⬅ Tuần trước</button>
    <button onclick="nextWeek()" class="bg-gray-700 px-4 py-2 rounded-xl">Tuần sau ➡</button>
  </div>

  <!-- Thanh tuần -->
  <div id="weekBar" class="grid grid-cols-7 gap-2 mb-6"></div>

  <!-- Danh sách ca làm -->
  <div id="schedule" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
</div>

<script src="../js/workSchedule.js">
</script>

</body>
</html>
