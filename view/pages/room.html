<!DOCTYPE html>
<html>
    <head>
        <title>Quản lý phòng</title>
        <meta charset="UTF-8"> 
    </head>
    <body>
        <div>
            <h3>Quản Lý Phòng Chiếu Phim</h3>
            <button onclick="openDialog()">Thêm</button>
            <dialog id="myDialog">
                 <select name="cinema_id" id="select">
                 </select>
                <input type="text" placeholder="Tên phòng" id="name">
                <input type="text" placeholder="Tổng số ghế" id="total">
                <input type="text" placeholder="Loại Phòng" id="type">
                <button onclick="submitData()">Lưu</button>
                <button onclick="closeDialog()">Đóng</button>
               
            </dialog>
            <div>
                <table>
                    <thead>
                        <tr>
                        <th>ID</th>
                        <th>Tên Phòng</th>
                        <th>Số ghế</th>
                        <th>Loại Phòng</th>
                        <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">

                    </tbody>
                </table>
            </div>
        </div>
        <script src="../js/room.js"></script>
        
    </body>
</html>
